    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    header h1 span {
      background: linear-gradient(135deg, #7c6aff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .count-badge {
      background: #2a2a3a;
      color: #a0a0c0;
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Search & Filters ── */
    .controls {
      display: flex;
      gap: 10px;
      flex: 1;
      min-width: 200px;
      flex-wrap: wrap;
    }

    #search {
      flex: 1;
      min-width: 160px;
      background: #0f0f18;
      border: 1px solid #2a2a40;
      color: #e8e8f0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: #7c6aff; }
    #search::placeholder { color: #555570; }

    #category {
      background: #0f0f18;
      border: 1px solid #2a2a40;
      color: #e8e8f0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .compare-btn {
      background: linear-gradient(135deg, #7c6aff, #a78bfa);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .compare-btn:hover { opacity: 0.85; }
    .compare-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Grid ── */
    .grid-wrap {
      padding: 24px 28px;
    }

    .result-info {
      font-size: 0.82rem;
      color: #6060a0;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #4a4a70;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card.selected {
      border-color: #7c6aff;
      box-shadow: 0 0 0 2px #7c6aff44;
    }

    /* Preview iframe */
    .preview-wrap {
      position: relative;
      height: 180px;
      overflow: hidden;
      background: #111120;
      cursor: pointer;
    }

    .preview-wrap iframe {
      width: 200%;
      height: 200%;
      transform: scale(0.5);
      transform-origin: top left;
      pointer-events: none;
      border: none;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      cursor: pointer;
    }

    .preview-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #3a3a58;
      font-size: 2.5rem;
    }

    /* Card footer */
    .card-footer {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-name {
      flex: 1;
      font-size: 0.82rem;
      color: #c8c8e8;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cat-tag {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .open-btn {
      background: #2a2a3a;
      color: #a0a0d0;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .open-btn:hover { background: #3a3a5a; color: #fff; }

    .select-check {
      width: 18px;
      height: 18px;
      border: 2px solid #3a3a58;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
      font-size: 11px;
    }

    .card.selected .select-check {
      background: #7c6aff;
      border-color: #7c6aff;
      color: #fff;
    }

    /* ── Compare Modal ── */
    #compare-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a10;
      z-index: 1000;
      flex-direction: column;
    }

    #compare-modal.open { display: flex; }

    .modal-header {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-header h2 { font-size: 1rem; color: #fff; }

    .close-btn {
      margin-left: auto;
      background: #2a2a3a;
      border: none;
      color: #a0a0c0;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .close-btn:hover { background: #3a3a5a; color: #fff; }

    .compare-frames {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 2px;
      background: #0a0a14;
    }

    .frame-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .frame-label {
      background: #15151f;
      color: #8888b0;
      padding: 8px 16px;
      font-size: 0.8rem;
      border-bottom: 1px solid #2a2a38;
      text-align: center;
      font-weight: 600;
    }

    .frame-panel iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

  </style>

  { folder: "vcare-free-html5-template-hospital-website",              cat: "health" },
  { folder: "vento-coming-soon-responsive-theme",                      cat: "coming-soon" },
  { folder: "vibe-free-html5-template-for-corporate-website",         cat: "business" },
  { folder: "vibrant-corporate-bootstrap-responsive-website-template", cat: "business" },
  { folder: "victory-educational-institution-free-html5-bootstrap-template", cat: "education" },
  { folder: "viver-free-html5-bootstrap-coming-soon-template",         cat: "coming-soon" },
  { folder: "vone-free-business-html5-responsive-website",             cat: "business" },
  { folder: "vteam-a-corporate-multipurpose-free-bootstrap-responsive-template", cat: "business" },
  { folder: "webtrends-free-bootstrap-responsive-web-template",        cat: "business" },
  { folder: "wedding-bells-free-responsive-html5-template",            cat: "wedding" },
  { folder: "wow-portfolio-multi-purpose-html5-template",              cat: "portfolio" },
  { folder: "zenlike",                                                  cat: "other" },
];

const catLabels = {
  business: "Business", portfolio: "Portfolio", "coming-soon": "Coming Soon",
  restaurant: "Restaurant", "real-estate": "Real Estate", health: "Health",
  education: "Education", photo: "Photo", beauty: "Beauty", interior: "Interior",
  app: "App", hosting: "Hosting", admin: "Admin", wedding: "Wedding",
  auto: "Auto", music: "Music", hotel: "Hotel", other: "Other"
};

let selected = [];
let previewLoaded = {};

function niceName(folder) {
  return folder
    .replace(/-\d+\.\d+(\.\d+)?$/, '')
    .replace(/[-_]/g, ' ')
    .replace(/\b(free|html5|bootstrap|responsive|web|template|website|theme|page)\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\b\w/g, c => c.toUpperCase());
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category').value;
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  const info = document.getElementById('result-info');

  const filtered = templates.filter(t =>
    (!q || t.folder.toLowerCase().includes(q)) &&
    (!cat || t.cat === cat)
  );

  info.textContent = `Showing ${filtered.length} of ${templates.length} templates`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  grid.innerHTML = filtered.map(t => {
    const isSelected = selected.includes(t.folder);
    return `
      <div class="card${isSelected ? ' selected' : ''}" data-folder="${t.folder}">
        <div class="preview-wrap" onclick="openTemplate('${t.folder}')">
          <div class="preview-placeholder">◻</div>
          <div class="preview-overlay"></div>
        </div>
        <div class="card-footer">
          <div class="select-check" onclick="toggleSelect(event,'${t.folder}')">${isSelected ? '✓' : ''}</div>
          <span class="card-name" title="${t.folder}">${niceName(t.folder)}</span>
          <span class="cat-tag cat-${t.cat}">${catLabels[t.cat]}</span>
          <a class="open-btn" href="${t.folder}/index.html" target="_blank" onclick="event.stopPropagation()">↗</a>
        </div>
      </div>`;
  }).join('');

  // Lazy-load previews via IntersectionObserver
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const wrap = entry.target;
          const folder = wrap.closest('.card').dataset.folder;
          if (!previewLoaded[folder]) {
            previewLoaded[folder] = true;
            const iframe = document.createElement('iframe');
            iframe.src = `${folder}/index.html`;
            iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts');
            wrap.innerHTML = '';
            wrap.appendChild(iframe);
            const overlay = document.createElement('div');
            overlay.className = 'preview-overlay';
            overlay.onclick = () => openTemplate(folder);
            wrap.appendChild(overlay);
          }
          obs.unobserve(wrap);
        }
      });
    }, { rootMargin: '200px' });

    document.querySelectorAll('.preview-wrap').forEach(el => obs.observe(el));
  }
}

function toggleSelect(e, folder) {
  e.stopPropagation();
  if (selected.includes(folder)) {
    selected = selected.filter(f => f !== folder);
  } else if (selected.length < 2) {
    selected.push(folder);
  } else {
    selected.shift();
    selected.push(folder);
  }
  updateCompareBtn();
  render();
}

function updateCompareBtn() {
  const btn = document.getElementById('compare-btn');
  btn.textContent = `Compare (${selected.length}/2)`;
  btn.disabled = selected.length < 2;
}

function openTemplate(folder) {
  window.open(`${folder}/index.html`, '_blank');
}

function openCompare() {
  if (selected.length < 2) return;
  document.getElementById('frame-a').src = `${selected[0]}/index.html`;
  document.getElementById('frame-b').src = `${selected[1]}/index.html`;
  document.getElementById('label-a').textContent = niceName(selected[0]);
  document.getElementById('label-b').textContent = niceName(selected[1]);
  document.getElementById('compare-modal').classList.add('open');
}

function closeCompare() {
  document.getElementById('compare-modal').classList.remove('open');
  document.getElementById('frame-a').src = 'about:blank';
  document.getElementById('frame-b').src = 'about:blank';
}

document.getElementById('compare-btn').addEventListener('click', openCompare);
document.getElementById('search').addEventListener('input', render);
document.getElementById('category').addEventListener('change', render);

render();
</script>
</body>
</html>
